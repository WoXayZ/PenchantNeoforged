modLoader="javafml"
loaderVersion="${loader_version_range}"

license="${mod_license}"
issueTrackerURL="https://github.com/WoXayZ/PenchantNeoforged/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/WoXayZ/PenchantNeoforged"
logoFile="assets/penchant/icon.png"
credits="Original mod by ThePotatoArchivist. Ported to NeoForge under LGPL-3.0-or-later."
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="penchant.mixins.json"

[[mixins]]
config="penchant.client.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

